<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Account</title>
</head>
<body>

<h2>Verify Account</h2>

<p id="emailText"></p>

<input id="otp" placeholder="OTP Code">

<br><br>

<button onclick="verify()">
    Verify
</button>

<button onclick="resendOTP()">
    Resend OTP
</button>

<p id="result"></p>

<script>

const API = "http://localhost:8000";

const email = localStorage.getItem("verify_email");

if (!email) {
    window.location.href = "register.html";
}

document.getElementById("emailText").innerText =
    "Email: " + email;

async function verify() {

    const response = await fetch(`${API}/verify/verify-email`, {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email: email,
            code: document.getElementById("otp").value
        })

    });

    const data = await response.json();

    if (response.ok) {

        alert("Account verified successfully.");

        localStorage.removeItem("verify_email");

        window.location.href = "login.html";

    } else {

        document.getElementById("result").innerText =
            data.detail;

    }

}

async function resendOTP() {

    const response = await fetch(`${API}/verify/resend-verification`, {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            email: email
        })

    });

    const data = await response.json();

    if (response.ok) {

        document.getElementById("result").innerText =
            "A new OTP has been sent to your email.";

    } else {

        document.getElementById("result").innerText =
            data.detail;

    }

}

</script>

</body>
</html>
