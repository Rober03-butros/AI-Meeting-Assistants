<!DOCTYPE html>
<html>

<head>
<!-- <script src="js/auth.js"></script> -->
<title>
My Meetings
</title>

</head>


<body>


<h2>
My Meetings
</h2>


<button onclick="logout()">
Logout
</button>


<div id="meetings"></div>


<button id="homeBtn">
    Home
</button>


<script>

// requireAuth();
const token =
localStorage.getItem("access_token");


if(!token){

    window.location.href =
    "login.html";

}



async function loadMeetings(){


    const response =
    await fetch(
        "http://localhost:8000/meetings",
        {
            headers:{
                "Authorization":
                "Bearer " + token
            }
        }
    );


    if(response.status === 401){

        localStorage.clear();

        window.location.href =
        "login.html";

        return;
    }


    const meetings =
    await response.json();



    const container =
    document.getElementById("meetings");

    document.getElementById("homeBtn").onclick =
    ()=>{

        window.location.href =
        "home.html";

    };


    container.innerHTML = "";



    meetings.forEach(meeting => {


    const link =
    document.createElement("a");


    link.href =
    `meeting.html?id=${meeting.id}`;


    link.textContent =
    meeting.title;


    link.style.display = "block";
    link.style.margin = "10px";
    link.style.fontSize = "20px";


    container.appendChild(link);


});



}



function logout(){

    localStorage.clear();

    window.location.href =
    "login.html";

}



loadMeetings();



</script>


</body>

</html>
